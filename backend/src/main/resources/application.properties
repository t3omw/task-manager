# Server
server.port=${PORT:10000}

# MongoDB
# This uses the Render variable first, and only uses localhost if the variable is missing
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/taskmanager}
spring.data.mongodb.database=taskmanager
spring.data.mongodb.auto-index-creation=true

# Security
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationPleaseChangeThisInProduction}
jwt.expiration=86400000

# Logging (Helps you see the real error next time)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG